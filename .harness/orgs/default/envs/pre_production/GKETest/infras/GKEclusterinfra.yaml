infrastructureDefinition:
  name: GKE-cluster-infra
  identifier: GKEclusterinfra
  orgIdentifier: default
  environmentRef: GKETest
  deploymentType: Kubernetes
  type: KubernetesGcp
  spec:
    connectorRef: org.GCPSAConnector
    cluster: <pipeline.stages.Provision_GKE.spec.execution.steps.TF_Apply.output.otputVariables.cluster_name>
    namespace: default
    releaseName: release-<+service.name>
  allowSimultaneousDeployments: false
