service:
  name: gke-app-service-latest
  identifier: gkeappservicelatest
  orgIdentifier: default
  serviceDefinition:
    spec:
      manifests:
        - manifest:
            identifier: gkemanifestidentifierlatest
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: org.TerraformGKEConnector
                  gitFetchType: Branch
                  paths:
                    - /k8s
                  branch: main
              skipResourceVersioning: false
              enableDeclarativeRollback: false
    type: Kubernetes
