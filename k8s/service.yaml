apiVersion: v1
kind: Service
metadata:
  name: my-app-service
  namespace: my-app
  labels:
    app: my-app
    service-type: ClusterIP
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: my-app
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-loadbalancer
  namespace: my-app
  labels:
    app: my-app
    service-type: LoadBalancer
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: my-app
  sessionAffinity: ClientIP