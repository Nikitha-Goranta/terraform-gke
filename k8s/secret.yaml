apiVersion: v1
kind: Secret
metadata:
  name: my-app-secrets
  namespace: my-app
  labels:
    app: my-app
type: Opaque
data:
  # Database credentials (base64 encoded)
  # These are example values - replace with actual credentials
  # To encode: echo -n 'your-value' | base64
  DB_USERNAME: YXBwX3VzZXI=  # app_user
  DB_PASSWORD: YXBwX3Bhc3M=  # app_pass
  API_KEY: eW91cl9hcGlfa2V5X2hlcmU=     # your_api_key_here
  JWT_SECRET: and1X3NlY3JldF9rZXk=      # jwt_secret_key
stringData:
  # You can also use stringData for plain text values that will be auto-encoded
  REDIS_URL: "redis://localhost:6379"
  SMTP_SERVER: "smtp.gmail.com:587"